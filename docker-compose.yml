version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.7.3-python3.11
  environment:
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: 'false'
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres-database:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./.env.example:/opt/airflow/.env
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - ./docker/pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/02-init-algo-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: on-failure
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: on-failure
    depends_on:
      - airflow-init

  api:
    image: python:3.11-slim
    container_name: api-service
    restart: always
    working_dir: /
    command: >
      bash -c "apt-get update && apt-get install -y curl &&
               pip install --no-cache-dir -r app/requirements.txt &&
               python app"
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./.env.example:/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  dashboard:
    image: python:3.11-slim
    container_name: dashboard-app
    restart: always
    working_dir: /
    command: >
      bash -c "apt-get update && apt-get install -y curl &&
               pip install --no-cache-dir -r app/requirements.txt &&
               python app"
    ports:
      - "8050:8050"
    volumes:
      - ./app:/app
      - ./.env.example:/.env
    environment:
      DASH_HOST: 0.0.0.0
      DASH_PORT: 8050    
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8050/"]
      interval: 10s
      timeout: 10s
      retries: 5